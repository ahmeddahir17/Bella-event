<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Event & Decor - Inquiry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A021; --dark-gold: #967A16; }

        body { 
            font-family: 'Poppins', sans-serif; 
            /* Background-ka sawirkaaga halkan ayuu ku jiraa */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://raw.githubusercontent.com/ahmeddahir17/Bella-event/main/image_61.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #333; 
            margin: 0; 
            padding: 20px 10px; 
        }

        .form-container { 
            width: 100%; 
            max-width: 650px; 
            background: rgba(255, 255, 255, 0.96); 
            margin: 40px auto; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-top: 8px solid var(--gold);
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2.5rem; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-style: italic; margin-bottom: 30px; color: #555; }

        .form-group { margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-bottom: 10px; font-size: 1rem; color: #222; }
        
        input[type="text"], input[type="email"], input[type="date"], select, textarea {
            width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: #fff;
        }

        .option-item { display: flex; align-items: center; padding: 10px 0; cursor: pointer; }
        .option-item input { margin-right: 15px; width: 18px; height: 18px; accent-color: var(--gold); }

        button { 
            background: linear-gradient(135deg, var(--gold), var(--dark-gold)); 
            color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            margin-top: 20px;
        }
        
        footer { text-align: center; margin-top: 30px; color: #fff; font-size: 0.9rem; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Bella Event & Decor</h1>
    <p class="subtitle">We Design. You Celebrate.</p>

    <form action="https://formspree.io/f/mqenbond" method="POST">
        <div class="form-group">
            <label>1. Full Name</label>
            <input type="text" name="full_name" required placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label>2. Phone Number</label>
            <input type="text" name="phone_number" required placeholder="Enter your phone number">
        </div>

        <div class="form-group">
            <label>3. Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email address">
        </div>

        <div class="form-group">
            <label>4. Event Type</label>
            <div class="option-item"><input type="radio" name="event_type" value="Wedding" required> Wedding</div>
            <div class="option-item"><input type="radio" name="event_type" value="Birthday"> Birthday Party</div>
            <div class="option-item"><input type="radio" name="event_type" value="Engagement"> Engagement</div>
            <div class="option-item"><input type="radio" name="event_type" value="Other"> Other</div>
        </div>

        <div class="form-group">
            <label>5. Event Date</label>
            <input type="date" name="event_date" required>
        </div>

        <div class="form-group">
            <label>6. Event Location</label>
            <input type="text" name="location" placeholder="City or Venue Name">
        </div>

        <div class="form-group">
            <label>7. Estimated Number of Guests</label>
            <input type="text" name="guests" placeholder="e.g. 150">
        </div>

        <div class="form-group">
            <label>8. Estimated Budget</label>
            <input type="text" name="budget" placeholder="Enter your budget range">
        </div>

        <div class="form-group">
            <label>9. Desired Colors/Theme</label>
            <input type="text" name="theme" placeholder="e.g. White & Gold">
        </div>

        <div class="form-group">
            <label>10. Services Interested In</label>
            <div class="option-item"><input type="checkbox" name="service" value="Full Decor"> Full Venue Decoration</div>
            <div class="option-item"><input type="checkbox" name="service" value="Flowers"> Floral Arrangements</div>
        </div>

        <div class="form-group">
            <label>11. Additional Details</label>
            <textarea name="message" rows="4" placeholder="Tell us more..."></textarea>
        </div>

        <button type="submit">Submit Inquiry</button>
    </form>
</div>

<footer>© 2026 Bella Event & Decor. All rights reserved.</footer>

</body>
</html>
