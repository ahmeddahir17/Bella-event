<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Event & Decor - Inquiry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A021; --dark-gold: #967A16; --light-bg: #FCF9F2; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--light-bg); color: #444; margin: 0; padding: 20px 10px; }
        .form-container { width: 100%; max-width: 650px; background: #ffffff; margin: 0 auto; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid rgba(197, 160, 33, 0.2); }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2.5rem; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-style: italic; margin-bottom: 40px; color: #888; }
        .section-header { background: var(--light-bg); padding: 10px 15px; border-left: 4px solid var(--gold); margin: 30px 0 20px 0; font-weight: 600; color: var(--dark-gold); font-size: 0.9rem; text-transform: uppercase; }
        .form-group { margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid #E0E0E0; border-radius: 10px; font-size: 16px; background-color: #FAFAFA; box-sizing: border-box; }
        input:focus { border-color: var(--gold); background-color: #fff; outline: none; }
        .option-item { display: flex; align-items: center; padding: 12px 15px; margin-bottom: 10px; border: 1px solid #F0F0F0; border-radius: 10px; cursor: pointer; }
        .option-item input { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--gold); }
        button { background: linear-gradient(135deg, var(--gold), var(--dark-gold)); color: white; border: none; padding: 18px; font-size: 1.1rem; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 20px; box-shadow: 0 5px 15px rgba(197, 160, 33, 0.3); }
        footer { text-align: center; margin-top: 30px; color: #AAA; font-size: 0.85rem; }
        @media (max-width: 600px) { h1 { font-size: 2rem; } .form-container { padding: 25px 20px; } }
    </style>
</head>
<body>
<div class="form-container">
    <h1>Bella Event & Decor</h1>
    <p class="subtitle">Making your special moments unforgettable</p>
    <form action="#" method="post">
        <div class="section-header">Personal Information</div>
        <div class="form-group"><label>Full Name</label><input type="text" placeholder="Full Name"></div>
        <div class="form-group"><label>Phone Number</label><input type="text" placeholder="+123 456 789"></div>
        <div class="section-header">Event Details</div>
        <div class="form-group">
            <label>Event Type</label>
            <label class="option-item"><input type="radio" name="et" value="Wedding"> Wedding Ceremony</label>
            <label class="option-item"><input type="radio" name="et" value="Birthday"> Birthday Party</label>
            <label class="option-item"><input type="radio" name="et" value="Corporate"> Corporate Event</label>
        </div>
        <div class="form-group"><label>Event Date</label><input type="date"></div>
        <button type="submit">Request a Quote</button>
    </form>
    <footer>&copy; 2026 Bella Event & Decor.</footer>
</div>
</body>
</html>
