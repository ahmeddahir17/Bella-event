<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Event & Decor - Inquiry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A021; --dark-gold: #967A16; --light-bg: #FCF9F2; }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1519222970733-f546218fa6d7'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #444; 
            margin: 0; 
            padding: 20px 10px; 
        }

        .form-container { 
            width: 100%; 
            max-width: 700px; 
            background: rgba(255, 255, 255, 0.9); 
            margin: 0 auto; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2.5rem; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-style: italic; margin-bottom: 30px; color: #666; }

        .form-group { margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-bottom: 10px; font-size: 1rem; }
        
        input[type="text"], input[type="email"], input[type="date"], select, textarea {
            width: 100%; padding: 12px; border: 1px solid #E0E0E0; border-radius: 10px; font-size: 16px; box-sizing: border-box;
        }

        .option-item { display: flex; align-items: center; padding: 10px; margin-bottom: 5px; cursor: pointer; }
        .option-item input { margin-right: 15px; width: 18px; height: 18px; accent-color: var(--gold); }

        button { 
            background: linear-gradient(135deg, var(--gold), var(--dark-gold)); 
            color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
        }
        
        footer { text-align: center; margin-top: 30px; color: #666; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Bella Event & Decor</h1>
    <p class="subtitle">Client Inquiry Form - Welcome!</p>

    <form action="https://formspree.io/f/mqenbond" method="POST">
        <div class="form-group">
            <label>1. Full Name</label>
            <input type="text" name="full_name" required placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label>2. Phone Number</label>
            <input type="text" name="phone_number" required placeholder="Enter your phone number">
        </div>

        <div class="form-group">
            <label>3. Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email address">
        </div>

        <div class="form-group">
            <label>4. Event Type</label>
            <div class="option-item"><input type="radio" name="event_type" value="Birthday" required> Birthday Party</div>
            <div class="option-item"><input type="radio" name="event_type" value="Wedding"> Wedding</div>
            <div class="option-item"><input type="radio" name="event_type" value="Engagement"> Engagement</div>
            <div class="option-item"><input type="radio" name="event_type" value="Other"> Other</div>
        </div>

        <div class="form-group">
            <label>5. Event Date</label>
            <input type="date" name="event_date" required>
        </div>

        <div class="form-group">
            <label>6. Event Location</label>
            <input type="text" name="location" placeholder="City or Venue Name">
        </div>

        <div class="form-group">
            <label>7. Estimated Number of Guests</label>
            <input type="text" name="guests" placeholder="e.g. 50, 100, 200+">
        </div>

        <div class="form-group">
            <label>8. What is your estimated budget for decor?</label>
            <input type="text" name="budget" placeholder="Enter your budget range">
        </div>

        <div class="form-group">
            <label>9. Desired Color Palette/Theme</label>
            <input type="text" name="theme" placeholder="e.g. Gold and White">
        </div>

        <div class="form-group">
            <label>10. Which services are you interested in?</label>
            <div class="option-item"><input type="checkbox" name="service" value="Full Decor"> Full Venue Decoration</div>
            <div class="option-item"><input type="checkbox" name="service" value="Table Setting"> Table Setting & Linens</div>
            <div class="option-item"><input type="checkbox" name="service" value="Backdrop"> Backdrop & Photo Area</div>
            <div class="option-item"><input type="checkbox" name="service" value="Flowers"> Floral Arrangements</div>
        </div>

        <div class="form-group">
            <label>11. Any additional details or special requests?</label>
            <textarea name="message" rows="4" placeholder="Tell us more about your dream event..."></textarea>
        </div>

        <button type="submit">Submit Inquiry</button>
    </form>
    
    <footer>© 2026 Bella Event & Decor. All rights reserved.</footer>
</div>

</body>
</html>
