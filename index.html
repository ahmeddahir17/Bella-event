<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Event & Decor - Inquiry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A021; --dark-gold: #967A16; }

        body, html { margin: 0; padding: 0; height: 100%; overflow-x: hidden; font-family: 'Poppins', sans-serif; }

        /* Slideshow Background Settings */
        #background-slider {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-color: #000;
        }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 2s ease-in-out;
        }

        .slide.active { opacity: 1; }

        /* Dark Overlay to make form pop */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }

        .form-container { 
            width: 90%; max-width: 700px; 
            background: rgba(255, 255, 255, 0.96); 
            margin: 50px auto; padding: 40px; 
            border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 10px solid var(--gold);
            position: relative; z-index: 1;
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2.8rem; margin: 0; }
        p.subtitle { text-align: center; font-style: italic; margin-bottom: 40px; color: #555; }

        .form-group { margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-bottom: 10px; color: #222; font-size: 1.05rem; }
        
        input, select, textarea {
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 8px rgba(197, 160, 33, 0.2); }

        .option-item { display: flex; align-items: center; padding: 8px 0; cursor: pointer; }
        .option-item input { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--gold); }

        button { 
            background: linear-gradient(135deg, var(--gold), var(--dark-gold)); 
            color: white; border: none; padding: 20px; width: 100%; 
            border-radius: 15px; font-size: 1.3rem; font-weight: 600; 
            cursor: pointer; margin-top: 20px; transition: 0.4s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(150, 122, 22, 0.4); }
        
        footer { text-align: center; padding: 20px; color: #fff; font-size: 0.9rem; text-shadow: 1px 1px 5px #000; }
    </style>
</head>
<body>

    <div id="background-slider">
        <div class="slide active" style="background-image: url('https://raw.githubusercontent.com/ahmeddahir17/Bella-event/main/image_61.png');"></div>
        <div class="slide" style="background-image: url('https://raw.githubusercontent.com/ahmeddahir17/Bella-event/main/image_59.png');"></div>
        <div class="slide" style="background-image: url('https://raw.githubusercontent.com/ahmeddahir17/Bella-event/main/image_60.png');"></div>
    </div>
    <div class="overlay"></div>

    <div class="form-container">
        <h1>Bella Event & Decor</h1>
        <p class="subtitle">"We Design, You Celebrate"</p>

        <form action="https://formspree.io/f/mqenbond" method="POST">
            <div class="form-group"><label>1. Full Name</label><input type="text" name="name" required placeholder="Enter your full name"></div>
            <div class="form-group"><label>2. Phone Number</label><input type="text" name="phone" required placeholder="Enter your phone number"></div>
            <div class="form-group"><label>3. Email Address</label><input type="email" name="email" required placeholder="Enter your email address"></div>

            <div class="form-group">
                <label>4. Event Type</label>
                <select name="event_type" required>
                    <option value="">Choose an option...</option>
                    <option value="Wedding">Wedding</option>
                    <option value="Birthday">Birthday Party</option>
                    <option value="Engagement">Engagement</option>
                    <option value="Other">Other Event</option>
                </select>
            </div>

            <div class="form-group"><label>5. Event Date</label><input type="date" name="date" required></div>
            <div class="form-group"><label>6. Event Location</label><input type="text" name="location" placeholder="City or Venue Name"></div>
            <div class="form-group"><label>7. Estimated Guests</label><input type="number" name="guests" placeholder="e.g. 200"></div>

            <div class="form-group"><label>8. Estimated Budget ($)</label><input type="text" name="budget" placeholder="Enter your budget range"></div>
            <div class="form-group"><label>9. Desired Colors/Theme</label><input type="text" name="theme" placeholder="e.g. Gold and White"></div>
            <div class="form-group">
                <label>10. Services Needed</label>
                <div class="option-item"><input type="checkbox" name="service" value="Full Decor"> Full Venue Decoration</div>
                <div class="option-item"><input type="checkbox" name="service" value="Flowers"> Floral Arrangements</div>
            </div>

            <div class="form-group"><label>11. Preferred Venue Style</label><input type="text" name="venue_style" placeholder="Indoor/Outdoor?"></div>
            <div class="form-group"><label>12. How did you hear about us?</label><input type="text" name="referral" placeholder="Social media, Friend, etc."></div>
            <div class="form-group"><label>13. Best Time to Contact You</label><input type="text" name="contact_time" placeholder="Morning/Afternoon?"></div>
            <div class="form-group"><label>14. Additional Requests</label><textarea name="message" rows="4" placeholder="Tell us more details..."></textarea></div>

            <button type="submit">Submit Inquiry</button>
        </form>
    </div>

    <footer>© 2026 Bella Event & Decor. All rights reserved.</footer>

    <script>
        // Slideshow Script
        let slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 5000); // Sawiradu waxay isbeddelayaan 5-tii ilbiriqsi kasta
    </script>

</body>
</html>
