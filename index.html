<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Event & Decor - Inquiry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A021; --dark-gold: #967A16; }

        body { 
            font-family: 'Poppins', sans-serif; 
            /* Sawirkaaga 3-aad ee Bella Event & Decor */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://raw.githubusercontent.com/ahmeddahir17/Bella-event/main/image_61.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #333; 
            margin: 0; 
            padding: 20px 10px; 
        }

        .form-container { 
            width: 100%; 
            max-width: 600px; 
            /* Halkan waxaan ka dhignay caddaan adag (0.95) si qoraalku u muuqdo */
            background: rgba(255, 255, 255, 0.95); 
            margin: 50px auto; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-top: 8px solid var(--gold);
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2.6rem; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-style: italic; margin-bottom: 35px; color: #555; }

        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #222; }
        
        input[type="text"], input[type="email"], input[type="date"], select, textarea {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #fff;
        }

        .option-item { display: flex; align-items: center; padding: 10px 0; }
        .option-item input { margin-right: 12px; width: 18px; height: 18px; accent-color: var(--gold); }

        button { 
            background: linear-gradient(135deg, var(--gold), var(--dark-gold)); 
            color: white; border: none; padding: 20px; width: 100%; 
            border-radius: 12px; font-size: 1.2rem; font-weight: 600; cursor: pointer;
            margin-top: 20px; box-shadow: 0 5px 15px rgba(197, 160, 33, 0.3);
        }
        
        footer { text-align: center; margin-top: 40px; color: #fff; font-size: 0.9rem; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Bella Event & Decor</h1>
    <p class="subtitle">Client Inquiry Form - Welcome!</p>

    <form action="https://formspree.io/f/mqenbond" method="POST">
        <div class="form-group">
            <label>1. Full Name</label>
            <input type="text" name="full_name" required placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label>2. Phone Number</label>
            <input type="text" name="phone_number" required placeholder="Enter your phone number">
        </div>

        <div class="form-group">
            <label>3. Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email address">
        </div>

        <div class="form-group">
            <label>4. Event Type</label>
            <div class="option-item"><input type="radio" name="event_type" value="Wedding" required> Wedding</div>
            <div class="option-item"><input type="radio" name="event_type" value="Birthday"> Birthday Party</div>
            <div class="option-item"><input type="radio" name="event_type" value="Engagement"> Engagement</div>
        </div>

        <div class="form-group">
            <label>5. Event Date</label>
            <input type="date" name="event_date" required>
        </div>

        <div class="form-group">
            <label>6. Tell us more about your event</label>
            <textarea name="message" rows="4" placeholder="Theme, Colors, Guests..."></textarea>
        </div>

        <button type="submit">Submit Inquiry</button>
    </form>
</div>

<footer>© 2026 Bella Event & Decor. All rights reserved.</footer>

</body>
</html>
